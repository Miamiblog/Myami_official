<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MYAMI — Launch Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:ital,wght@1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:  #09090A;
    --gold:   #C8A84B;
    --gold-glow: rgba(200,168,75,0.35);
    --linen:  #F2EDE4;
    --muted:  #6B6357;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── CANVAS ── */
  .canvas {
    width: 800px;
    height: 800px;
    background: var(--black);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* ── GRAIN ── */
  .grain {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    animation: grainIn 0.8s ease forwards 0.3s;
  }

  /* ── AMBIENT GLOW ── */
  .glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,168,75,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    animation: glowIn 2s ease forwards 1.5s;
    pointer-events: none;
  }

  /* ── SCAN LINE ── */
  .scan {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent 0%, var(--gold) 30%, var(--gold) 70%, transparent 100%);
    top: 50%;
    transform: scaleX(0);
    transform-origin: left center;
    opacity: 0;
    animation: scanDraw 0.7s cubic-bezier(0.4,0,0.2,1) forwards 0.8s;
  }

  /* ── WORDMARK CONTAINER ── */
  .wordmark-wrap {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: baseline;
    gap: 0;
    opacity: 0;
    animation: wrapIn 0.1s forwards 1.4s;
  }

  /* Individual letters */
  .letter {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 120px;
    letter-spacing: 0.12em;
    color: var(--linen);
    display: inline-block;
    opacity: 0;
    transform: translateY(20px);
  }

  .letter.m1 { animation: letterIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards 1.5s; }
  .letter.y  { animation: letterIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards 1.65s; }
  .letter.a  {
    color: var(--gold);
    animation: letterIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards 1.85s,
               aGlow 1.5s ease forwards 2.35s;
    position: relative;
  }
  .letter.a::after {
    content: 'A';
    position: absolute;
    left: 0; top: 0;
    color: var(--gold);
    filter: blur(12px);
    opacity: 0;
    animation: aBloom 1.5s ease forwards 2.35s;
  }
  .letter.m2 { animation: letterIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards 2.0s; }
  .letter.i  { animation: letterIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards 2.1s; }

  /* ── DIVIDER ── */
  .divider {
    position: absolute;
    left: 50%; top: calc(50% + 76px);
    transform: translateX(-50%);
    height: 1px;
    width: 0;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    animation: dividerGrow 0.6s ease forwards 2.8s;
  }

  /* ── DIVISIONS ── */
  .divisions {
    position: absolute;
    left: 50%; top: calc(50% + 100px);
    transform: translateX(-50%);
    display: flex;
    gap: 28px;
    align-items: center;
    white-space: nowrap;
  }
  .div-name {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    transform: translateY(8px);
  }
  .div-sep {
    font-size: 6px;
    color: var(--gold);
    opacity: 0;
  }
  .div-name.d1, .div-sep.s1 { animation: divIn 0.4s ease forwards 3.1s; }
  .div-sep.s1               { animation: divIn 0.4s ease forwards 3.3s; }
  .div-name.d2              { animation: divIn 0.4s ease forwards 3.3s; }
  .div-sep.s2               { animation: divIn 0.4s ease forwards 3.5s; }
  .div-name.d3              { animation: divIn 0.4s ease forwards 3.5s; }
  .div-sep.s3               { animation: divIn 0.4s ease forwards 3.7s; }
  .div-name.d4              { animation: divIn 0.4s ease forwards 3.7s; }

  /* ── TAGLINE CONTAINER ── */
  .tagline-wrap {
    position: absolute;
    left: 50%; top: calc(50% + 142px);
    transform: translateX(-50%);
    opacity: 0;
    animation: tagIn 0.8s ease forwards 4.2s;
  }
  .tagline {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(107,99,87,0.6);
    white-space: nowrap;
  }

  /* ── CLOSING STATEMENT ── */
  .closing {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0;
    pointer-events: none;
  }
  .closing-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-style: italic;
    font-weight: 300;
    color: var(--linen);
    line-height: 1.25;
    white-space: nowrap;
  }
  .closing-text em {
    font-style: normal;
    color: var(--gold);
  }
  .closing-sub {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 20px;
    opacity: 0;
    animation: none;
  }

  /* ── CORNER MARKS ── */
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    opacity: 0;
    animation: cornerIn 0.5s ease forwards 1.2s;
  }
  .corner.tl { top: 32px; left: 32px; border-top: 1px solid rgba(200,168,75,0.3); border-left: 1px solid rgba(200,168,75,0.3); }
  .corner.tr { top: 32px; right: 32px; border-top: 1px solid rgba(200,168,75,0.3); border-right: 1px solid rgba(200,168,75,0.3); }
  .corner.bl { bottom: 32px; left: 32px; border-bottom: 1px solid rgba(200,168,75,0.3); border-left: 1px solid rgba(200,168,75,0.3); }
  .corner.br { bottom: 32px; right: 32px; border-bottom: 1px solid rgba(200,168,75,0.3); border-right: 1px solid rgba(200,168,75,0.3); }

  /* ── HANDLE ── */
  .handle {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(107,99,87,0.5);
    text-transform: uppercase;
    opacity: 0;
    animation: tagIn 0.6s ease forwards 4.6s;
    white-space: nowrap;
  }

  /* ── SEQUENCE CONTROLLER ── */
  /* Phase 2: everything fades out at 6.5s, closing fades in at 7s */
  .phase1 { animation-name: phase1Out; animation-duration: 0.8s; animation-fill-mode: forwards; animation-delay: 6.5s; }
  .closing { animation: closingIn 1s ease forwards 7.2s; }
  .closing-sub { animation: tagIn 0.6s ease forwards 8.2s; }

  /* ── KEYFRAMES ── */
  @keyframes grainIn {
    to { opacity: 1; }
  }
  @keyframes glowIn {
    to { opacity: 1; }
  }
  @keyframes scanDraw {
    0%  { transform: scaleX(0); opacity: 1; }
    70% { transform: scaleX(1); opacity: 1; }
    100%{ transform: scaleX(1); opacity: 0; }
  }
  @keyframes wrapIn {
    to { opacity: 1; }
  }
  @keyframes letterIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes aGlow {
    0%   { text-shadow: none; }
    40%  { text-shadow: 0 0 30px rgba(200,168,75,0.8), 0 0 60px rgba(200,168,75,0.4); }
    100% { text-shadow: 0 0 12px rgba(200,168,75,0.3); }
  }
  @keyframes aBloom {
    0%   { opacity: 0; }
    30%  { opacity: 0.7; }
    100% { opacity: 0; }
  }
  @keyframes dividerGrow {
    from { width: 0; }
    to   { width: 320px; }
  }
  @keyframes divIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes tagIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cornerIn {
    to { opacity: 1; }
  }
  @keyframes phase1Out {
    to { opacity: 0; }
  }
  @keyframes closingIn {
    from { opacity: 0; transform: translate(-50%, calc(-50% + 12px)); }
    to   { opacity: 1; transform: translate(-50%, -50%); }
  }

  /* ── REPLAY BUTTON ── */
  .replay {
    position: fixed;
    bottom: 24px; right: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--black);
    border: 1px solid #252220;
    padding: 10px 20px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    z-index: 100;
  }
  .replay:hover { color: var(--gold); border-color: var(--gold); }

  /* ── FORMAT NOTE ── */
  .format-note {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(107,99,87,0.5);
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="format-note">800 × 800 — Screen record this canvas</div>

<!-- CANVAS -->
<div class="canvas" id="canvas">

  <div class="grain"></div>
  <div class="glow"></div>

  <!-- Corner marks -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Scan line -->
  <div class="scan"></div>

  <!-- Phase 1: Wordmark sequence -->
  <div class="phase1" style="position:absolute;inset:0;pointer-events:none;">

    <div class="wordmark-wrap">
      <span class="letter m1">M</span>
      <span class="letter y">Y</span>
      <span class="letter a">A</span>
      <span class="letter m2">M</span>
      <span class="letter i">I</span>
    </div>

    <div class="divider"></div>

    <div class="divisions">
      <span class="div-name d1">Tech</span>
      <span class="div-sep s1">✦</span>
      <span class="div-name d2">Media</span>
      <span class="div-sep s2">✦</span>
      <span class="div-name d3">Entertainment</span>
      <span class="div-sep s3">✦</span>
      <span class="div-name d4">Wear</span>
    </div>

    <div class="tagline-wrap">
      <div class="tagline">Technology · Media · Culture</div>
    </div>

  </div>

  <!-- Phase 2: Closing statement -->
  <div class="closing">
    <div class="closing-text">
      We're just<br/>getting <em>started.</em>
    </div>
    <div class="closing-sub">@myami_official</div>
  </div>

  <!-- Handle -->
  <div class="handle">@myami_official</div>

</div>

<button class="replay" onclick="replay()">↺ Replay</button>

<script>
  function replay() {
    const canvas = document.getElementById('canvas');
    canvas.style.display = 'none';
    setTimeout(() => {
      canvas.style.display = 'block';
      // Force reflow to restart all animations
      void canvas.offsetWidth;
      // Re-clone to restart CSS animations
      const newCanvas = canvas.cloneNode(true);
      canvas.parentNode.replaceChild(newCanvas, canvas);
      newCanvas.id = 'canvas';
    }, 100);
  }

  // Replay button re-target after clone
  document.querySelector('.replay').addEventListener('click', replay);
</script>

</body>
  </html>
